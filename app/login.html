<!DOCTYPE html>
<html lang="es-CO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/img/logo.png" type="image/x-icon">

    <meta name="author" content="Kevin Osorio">
    <meta name="description" content="Taller 3 de maquetacion web - Selección de Portugal">
    <meta name="keywords" content="TALLER, taller, Taller, Portugal, Bootstrap">
   
    <meta name="theme-color" content="#8B0000">
    <meta name="MobileOptimized" content="width">
    <meta name="HandheldFriendly" content="true">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Tablas Bootstrap - Selección de Portugal</title>

    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <!-- SOLUCIÓN: Agregada etiqueta <main> como punto de referencia principal con el centrado de Bootstrap -->
    <main class="d-flex align-items-center justify-content-center vh-100">

        <!-- Tarjeta con borde superior amarillo/dorado, esquinas redondeadas y sombra profunda -->
        <div class="card border-0 border-top border-4 border-warning rounded-3 shadow-lg m-3" style="max-width: 420px; width: 100%;">
            
            <!-- Encabezado con fondo rojo, texto blanco y centrado -->
            <div class="card-header bg-danger text-white text-center py-4 border-0">
                <h3 class="m-0 fw-bold tracking-wide">ÁREA RESTRINGIDA</h3>
                <span class="small text-white text-uppercase">
                    Selecção Nacional <span class="fw-bold">Portugal</span>
                </span>
            </div>

            <!-- Cuerpo del Formulario -->
            <div class="card-body p-4 p-sm-5">
                <form action="dashboard.html" method="POST" class="needs-validation" novalidate>
                    
                    <!-- Input de Usuario / Correo -->
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-secondary">Usuario o Correo</label>
                        <input type="email" class="form-control form-control-lg" id="username" placeholder="ejemplo@fpf.pt" required>
                        <div class="invalid-feedback">
                            Por favor introduce un correo válido.
                        </div>
                    </div>

                    <!-- Input de Contraseña -->
                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label fw-semibold text-secondary m-0">Contraseña</label>
                            <a href="#" class="small text-danger text-decoration-none fw-semibold">¿La olvidaste?</a>
                        </div>
                        <input type="password" class="form-control form-control-lg" id="password" placeholder="••••••••" required>
                        <div class="invalid-feedback">
                            La contraseña es obligatoria.
                        </div>
                    </div>

                    <!-- Recordar sesión -->
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Recordar mi sesión</label>
                    </div>

                    <!-- Botón de Envío Verde (Success) -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-success btn-lg text-uppercase fs-6 fw-bold shadow-sm">
                            Entrar al Sistema
                        </button>
                    </div>

                    <!-- Registro o soporte -->
                    <div class="text-center mt-4">
                        <p class="small text-muted mb-0">
                            ¿No tienes cuenta? <a href="registro.html" class="text-danger text-decoration-none fw-semibold">Solicitar acceso</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <!-- Script de Bootstrap y validación nativa de formularios -->
    <script src="../assets/js/bootstrap.bundle.min.js"></script>
    <script>
        // Script estándar de Bootstrap para activar alertas visuales en campos vacíos
        (function () {
            'use strict'
            var forms = document.querySelectorAll('.needs-validation')
            Array.prototype.slice.call(forms).forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
